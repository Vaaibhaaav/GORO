services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build: .
    command: ["./goro-server"]
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=8080
    depends_on:
      - redis
    volumes:
      - ./static:/root/static

  worker:
    build: .
    command: ["./goro-worker"]
    ports:
      - "8081:8081"
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_CONCURRENCY=5
      - METRICS_PORT=8081
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml